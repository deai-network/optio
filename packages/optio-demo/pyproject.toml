[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "optio-demo"
version = "0.1.0"
description = "Demo application exercising all optio-core features"
license = "Apache-2.0"
requires-python = ">=3.11"
dependencies = [
    "optio-core[redis]",
    "marimo>=0.9",
]

[tool.setuptools.packages.find]
where = ["src"]
