services:
  sshd:
    build:
      context: .
      dockerfile: Dockerfile.sshd
    environment:
      - PUID=1000
      - PGID=1000
      - USER_NAME=optiotest
      - PUBLIC_KEY_FILE=/keys/id_ed25519.pub
      - SUDO_ACCESS=false
      - PASSWORD_ACCESS=false
    volumes:
      - ./ssh-keys:/keys:ro
      - ./fake_codex.py:/usr/local/bin/fake_codex.py:ro
      - ./codex-shim.sh:/usr/local/bin/codex:ro
      - ./ttyd-shim.sh:/usr/local/bin/ttyd:ro
    ports:
      # Ephemeral host port; the harness reads it back via `docker compose port`.
      - "127.0.0.1::2222"
